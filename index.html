<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="すうちょくせんマスター">
  <meta name="theme-color" content="#1a6fa8">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <title>めざせ！すうちょくせんマスター</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1a6fa8;
      touch-action: none;
    }
    #game-container {
      position: relative;
      width: 100%; height: 100%;
    }
    canvas#game-canvas {
      display: block;
      width: 100%; height: 100%;
    }
    #numpad {
      position: absolute;
      z-index: 10;
      right: calc(10px + env(safe-area-inset-right));
      bottom: calc(10px + env(safe-area-inset-bottom));
      background: rgba(0,0,0,0.75);
      border-radius: 10px;
      padding: 6px;
      display: none;
      grid-template-columns: repeat(6, 44px);
      grid-template-rows: repeat(2, 44px);
      gap: 5px;
    }
    #numpad.visible { display: grid; }
    #numpad button {
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      background: #2a5a8a;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      touch-action: manipulation;
    }
    #numpad button#btn-clear { background: #8a2a2a; }
    #numpad button#btn-ok    { background: #2a8a4a; }
    #numpad.decimal { grid-template-columns: repeat(7, 44px); }
    #numpad button#btn-dot { display: none; background: #2a5a8a; }
    #numpad.decimal button#btn-dot { display: block; }
    #display-input {
      position: absolute;
      z-index: 11;
      left: calc(10px + env(safe-area-inset-left));
      bottom: calc(10px + env(safe-area-inset-bottom));
      font-size: 32px;
      font-weight: bold;
      color: #fff;
      background: rgba(0,0,0,0.62);
      border: 3px solid #ffcc33;
      border-radius: 12px;
      padding: 5px 14px;
      min-width: 100px;
      text-align: center;
      letter-spacing: 2px;
      display: none;
    }
    #display-input.visible { display: block; }
    #display-input.wrong {
      border-color: #ff4444;
      animation: display-shake 0.35s ease;
    }
    @keyframes display-shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    #rotate-overlay {
      position: absolute;
      inset: 0;
      background: #0d4f7a;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .rotate-inner { text-align: center; color: #fff; }
    .rotate-icon {
      font-size: 72px;
      animation: rotate-hint 1.6s ease-in-out infinite;
    }
    .rotate-text { font-size: 28px; font-weight: bold; margin-top: 16px; }
    @keyframes rotate-hint {
      0%, 100% { transform: rotate(-12deg); }
      50%      { transform: rotate(78deg); }
    }
    @media (orientation: portrait) {
      #rotate-overlay { display: flex; }
    }
    #tutorial-open-btn {
      position: absolute;
      z-index: 12;
      top: calc(14px + env(safe-area-inset-top));
      right: calc(14px + env(safe-area-inset-right));
      font-size: 15px;
      font-weight: bold;
      color: #fff;
      background: rgba(0,0,0,0.55);
      border: 2px solid #ffcc33;
      border-radius: 20px;
      padding: 8px 16px;
      cursor: pointer;
      touch-action: manipulation;
      display: none;
      white-space: nowrap; /* ボタンの文字は折り返さない */
    }
    #tutorial-open-btn.visible { display: block; }
    #tutorial-overlay, #tutorial-end-overlay, #rankup-overlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      background: rgba(0,0,0,0.72);
      display: none;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    #tutorial-overlay.visible, #tutorial-end-overlay.visible, #rankup-overlay.visible { display: flex; }
    .tutorial-card {
      width: min(560px, 88vw);
      max-height: 84vh;
      overflow-y: auto;
      background: #fdf6e3;
      border: 4px solid #3C2415;
      border-radius: 18px;
      padding: 24px 26px 18px;
      color: #3C2415;
    }
    .tutorial-card .tutorial-icon { font-size: 52px; text-align: center; margin-bottom: 6px; }
    /* わかちがき（単語間スペース）でだけ折り返す＝「あと2〜3文字」の変な改行を防ぐ。
       折り返すときは text-wrap: balance で行の長さを揃える（非対応ブラウザは無視されるだけ）。 */
    .tutorial-card h2 {
      font-size: 22px; text-align: center; margin-bottom: 12px;
      word-break: keep-all; text-wrap: balance;
    }
    .tutorial-card p {
      font-size: 16px; line-height: 1.8; margin-bottom: 8px; text-align: center;
      word-break: keep-all; text-wrap: balance;
    }
    .tutorial-nav {
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }
    #tutorial-start, #tutorial-end-close, #rankup-close {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: #F7931E;
      border: none;
      border-radius: 12px;
      padding: 12px 40px;
      cursor: pointer;
      touch-action: manipulation;
      white-space: nowrap; /* ボタンの文字は絶対に折り返さない */
    }
    /* ローディング：JSが動く前から見える（display:flexが初期値）＝無言の青画面をなくす */
    #loading-overlay {
      position: absolute;
      inset: 0;
      z-index: 90;
      background: #0d4f7a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    #loading-overlay.hidden { display: none; }
    .loading-text { font-size: 24px; font-weight: bold; margin-bottom: 18px; }
    .loading-bar-frame {
      width: min(320px, 70vw);
      height: 18px;
      border: 3px solid #ffcc33;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(0,0,0,0.35);
    }
    #loading-bar {
      width: 0%;
      height: 100%;
      background: #F7931E;
      transition: width 0.15s ease;
    }
    /* 致命的エラー：無言で固まる代わりに、やりなおしボタンを出す */
    #fatal-overlay {
      position: absolute;
      inset: 0;
      z-index: 200;
      background: #0d4f7a;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
    }
    #fatal-overlay.visible { display: flex; }
    #fatal-overlay .fatal-inner { padding: 20px; }
    #fatal-overlay p { font-size: 20px; font-weight: bold; margin-bottom: 16px; }
    #fatal-reload {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: #F7931E;
      border: none;
      border-radius: 12px;
      padding: 12px 40px;
      cursor: pointer;
      touch-action: manipulation;
    }
    /* プレイ画面ガイド中：いま押してほしいテンキーを光らせる */
    #numpad.tutorial-focus {
      animation: numpad-pulse 1s ease-in-out infinite;
    }
    @keyframes numpad-pulse {
      0%, 100% { box-shadow: 0 0 0 3px #ffdd00; }
      50%      { box-shadow: 0 0 0 9px #ffcc33; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="display-input">---</div>
    <div id="numpad">
      <button data-digit="1">1</button>
      <button data-digit="2">2</button>
      <button data-digit="3">3</button>
      <button data-digit="4">4</button>
      <button data-digit="5">5</button>
      <button id="btn-clear">⌫</button>
      <button data-digit="6">6</button>
      <button data-digit="7">7</button>
      <button data-digit="8">8</button>
      <button data-digit="9">9</button>
      <button data-digit="0">0</button>
      <button id="btn-dot">.</button>
      <button id="btn-ok">OK</button>
    </div>
    <button id="tutorial-open-btn">📖 あそびかた</button>
    <div id="tutorial-overlay">
      <div class="tutorial-card">
        <div class="tutorial-icon">🏴‍☠️</div>
        <h2>きみは しまの ほうしゅ！</h2>
        <p>うみの むこうから かいぞくせんが やってくる！</p>
        <p>たいほうで やっつけて しまを まもろう。</p>
        <p>やりかたは あそびながら おしえるよ！</p>
        <div class="tutorial-nav">
          <button id="tutorial-start">はじめる</button>
        </div>
      </div>
    </div>
    <div id="tutorial-end-overlay">
      <div class="tutorial-card">
        <div class="tutorial-icon">🎓</div>
        <h2>れんしゅう おわり！</h2>
        <p>ここからは じぶんの ちからで やっつけよう！</p>
        <p>⭐ れんぞくで めいちゅうすると <b>ランクアップ</b>！</p>
        <p>🔭 ランクが あがると てきが <b>ちいさく</b> なるよ。<b>ズーム</b>して しらべよう！</p>
        <p>🏆 「でんせつ」まで いくと「<b>おぼえてうつ</b>」が かいほう！</p>
        <div class="tutorial-nav">
          <button id="tutorial-end-close">よし、やるぞ！</button>
        </div>
      </div>
    </div>
    <div id="rankup-overlay">
      <div class="tutorial-card">
        <div class="tutorial-icon" id="rankup-icon">⭐</div>
        <h2 id="rankup-title"></h2>
        <div id="rankup-body"></div>
        <div class="tutorial-nav">
          <button id="rankup-close">やってみる！</button>
        </div>
      </div>
    </div>
    <div id="rotate-overlay">
      <div class="rotate-inner">
        <div class="rotate-icon">📱</div>
        <div class="rotate-text">よこむきにしてね</div>
      </div>
    </div>
    <div id="loading-overlay">
      <div class="loading-text">🏴‍☠️ じゅんびちゅう…</div>
      <div class="loading-bar-frame"><div id="loading-bar"></div></div>
    </div>
    <div id="fatal-overlay">
      <div class="fatal-inner">
        <p id="fatal-message">あれれ、うまく うごかなかった！</p>
        <button id="fatal-reload">もういちど ひらく</button>
      </div>
    </div>
  </div>
  <script>
    // クラシックscript＝古い端末でモジュールが解釈できなくてもここは必ず動く。
    // 「無言の青画面」の代わりに、必ず何かしらのメッセージを出すための受け皿。
    (function () {
      var shown = false
      window.showFatalError = function (err, message) {
        if (shown) return
        shown = true
        try { console.error(err) } catch (_) {}
        if (message) document.getElementById('fatal-message').textContent = message
        document.getElementById('loading-overlay').className = 'hidden'
        document.getElementById('fatal-overlay').className = 'visible'
      }
      document.getElementById('fatal-reload').addEventListener('click', function () {
        window.location.reload()
      })
      // 起動前のエラー（古いiOSのモジュール解釈エラー等）だけ全体エラーとして扱う。
      // 起動後の些細なエラーでゲームを止めないため、__gameBooted 後は無視する
      window.addEventListener('error', function (e) {
        if (!window.__gameBooted) window.showFatalError(e.error || e.message)
      })
      // 見張り：8秒たってもJS本体が動き出さない＝この端末では動かない可能性が高い
      setTimeout(function () {
        if (!window.__gameBooted) {
          window.showFatalError(null,
            'うごかないみたい…。おうちのひとへ：この端末のOS/ブラウザが古い可能性があります。アップデート後にもう一度お試しください。')
        }
      }, 8000)
    })()
  </script>
  <script type="module" src="js/game.js"></script>
</body>
</html>
