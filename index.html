<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="すうちょくせんマスター">
  <meta name="theme-color" content="#1a6fa8">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <title>めざせ！すうちょくせんマスター</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1a6fa8;
      touch-action: none;
    }
    #game-container {
      position: relative;
      width: 100%; height: 100%;
    }
    canvas#game-canvas {
      display: block;
      width: 100%; height: 100%;
    }
    #numpad {
      position: absolute;
      z-index: 10;
      right: calc(12px + env(safe-area-inset-right));
      bottom: calc(110px + env(safe-area-inset-bottom));
      background: rgba(0,0,0,0.75);
      border-radius: 12px;
      padding: 8px;
      display: none;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(4, 52px);
      gap: 6px;
    }
    #numpad.visible { display: grid; }
    #numpad button {
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      background: #2a5a8a;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      touch-action: manipulation;
    }
    #numpad button#btn-clear { background: #8a2a2a; }
    #numpad button#btn-ok    { background: #2a8a4a; }
    #display-input {
      position: absolute;
      z-index: 11;
      right: calc(210px + env(safe-area-inset-right));
      top: calc(14px + env(safe-area-inset-top));
      font-size: 52px;
      font-weight: bold;
      color: #fff;
      background: rgba(0,0,0,0.62);
      border: 4px solid #ffcc33;
      border-radius: 14px;
      padding: 6px 22px;
      min-width: 150px;
      text-align: center;
      letter-spacing: 2px;
      display: none;
    }
    #display-input.visible { display: block; }
    #rotate-overlay {
      position: absolute;
      inset: 0;
      background: #0d4f7a;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .rotate-inner { text-align: center; color: #fff; }
    .rotate-icon {
      font-size: 72px;
      animation: rotate-hint 1.6s ease-in-out infinite;
    }
    .rotate-text { font-size: 28px; font-weight: bold; margin-top: 16px; }
    @keyframes rotate-hint {
      0%, 100% { transform: rotate(-12deg); }
      50%      { transform: rotate(78deg); }
    }
    @media (orientation: portrait) {
      #rotate-overlay { display: flex; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="display-input">---</div>
    <div id="numpad">
      <button data-digit="7">7</button>
      <button data-digit="8">8</button>
      <button data-digit="9">9</button>
      <button data-digit="4">4</button>
      <button data-digit="5">5</button>
      <button data-digit="6">6</button>
      <button data-digit="1">1</button>
      <button data-digit="2">2</button>
      <button data-digit="3">3</button>
      <button id="btn-clear">⌫</button>
      <button data-digit="0">0</button>
      <button id="btn-ok">OK</button>
    </div>
    <div id="rotate-overlay">
      <div class="rotate-inner">
        <div class="rotate-icon">📱</div>
        <div class="rotate-text">よこむきにしてね</div>
      </div>
    </div>
  </div>
  <script type="module" src="js/game.js"></script>
</body>
</html>
