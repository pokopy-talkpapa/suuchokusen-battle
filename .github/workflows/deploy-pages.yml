name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# ビルド（アーティファクト作成）とデプロイを別ジョブに分ける（GitHub公式の標準パターン）。
# 1ジョブにまとめると、見張り役(retry-pages.yml)の `gh run rerun --failed` が
# ビルドごとやり直してアーティファクトを毎回追加→「github-pages が複数」で永久に失敗する
# 自己増殖ループに陥る（2026-07-06に発生）。分離すれば --failed は deploy だけを再実行し、
# アーティファクトは1個のまま＝リトライしても増えない。
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
