name: Retry Pages deploy on failure

# 見張り役: デプロイが失敗で完了したら、少し待ってから同じrunを再実行する。
# デプロイ本体の中から自分をrerunすることはできない（実行中は再実行不可）ため別ワークフローにする。
# 再実行も失敗すればまたこのワークフローが発火する。run_attempt上限で無限ループを防止。
on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]

permissions:
  actions: write

jobs:
  retry:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 5
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Pages congestion to clear, then rerun
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 90
          gh run rerun ${{ github.event.workflow_run.id }} --failed --repo ${{ github.repository }}
